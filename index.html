<!DOCTYPE html>
<html>
<head>

<title>Rakib IPTV</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#050816;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* Header */

header{

background:linear-gradient(90deg,#ff1493,#ff69b4);
padding:18px;
text-align:center;
font-size:32px;
font-weight:bold;
box-shadow:0 0 20px #ff1493;
}

/* Video Player */

.player-container{

position:relative;
background:black;
}

video{

width:100%;
height:240px;
background:black;
}

/* Search */

.search-box{

padding:14px;
background:#0b1225;
}

.search-box input{

width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:14px;
background:#131c31;
color:white;
outline:none;
}

/* Channel List */

#channels{

padding:12px;
padding-bottom:120px;
display:grid;
grid-template-columns:1fr;
gap:14px;
}

/* Channel Card */

.channel{

display:flex;
align-items:center;
gap:16px;
background:linear-gradient(145deg,#10182d,#16213d);
padding:16px;
border-radius:20px;
cursor:pointer;
transition:.3s;
font-size:22px;
font-weight:bold;
box-shadow:0 0 12px #00000050;
}

.channel:hover{

transform:scale(1.02);
background:#ff149320;
box-shadow:0 0 15px #ff149350;
}

.channel img{

width:65px;
height:65px;
border-radius:16px;
object-fit:cover;
background:white;
}

/* Active Channel */

.active{

border:2px solid #ff1493;
box-shadow:0 0 18px #ff1493;
}

/* Floating Controls */

.controls{

position:fixed;
bottom:12px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:10px;
background:rgba(10,10,20,.85);
padding:10px 14px;
border-radius:25px;
backdrop-filter:blur(10px);
z-index:999;
box-shadow:0 0 20px #ff149360;
}

.control-btn{

width:48px;
height:48px;
border:none;
border-radius:50%;
background:#ff1493;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.control-btn:active{

transform:scale(.92);
}

.volume{

width:90px;
}

/* Visitor Popup */

#visitorToast{

position:fixed;
bottom:90px;
right:15px;
background:#ff1493;
color:white;
padding:12px 18px;
border-radius:16px;
font-size:16px;
font-weight:bold;
z-index:9999;
box-shadow:0 0 15px #ff1493;
animation:fadeIn .5s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<header>

🌸 Rakib IPTV 🌸

</header>

<!-- Visitor Popup -->

<div id="visitorToast">

👀 Live Visitors Online

</div>

<!-- Video -->

<div class="player-container">

<video id="video"
autoplay
controls>

</video>

</div>

<!-- Search -->

<div class="search-box">

<input type="text"
id="search"
placeholder="Search channel..."
onkeyup="searchChannel()">

</div>

<!-- Channel List -->

<div id="channels"></div>

<!-- Bottom Controls -->

<div class="controls">

<button class="control-btn"
onclick="prevChannel()">

⏮

</button>

<button class="control-btn"
onclick="togglePlay()">

⏯

</button>

<button class="control-btn"
onclick="nextChannel()">

⏭

</button>

<input type="range"
class="volume"
min="0"
max="1"
step="0.1"
value="1"
oninput="changeVolume(this.value)">

<button class="control-btn"
onclick="toggleFullscreen()">

⛶

</button>

</div>

<script>

/* Playlist */

const playlist =
'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';

/* Variables */

let channels = [];

let currentIndex = 0;

/* Load Playlist */

fetch(playlist)

.then(response => response.text())

.then(data => {

const lines = data.split('\n');

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith('#EXTINF')){

const info = lines[i];

const url = lines[i+1];

const name = info.split(',')[1];

let logo = '';

const logoMatch =
info.match(/tvg-logo="(.*?)"/);

if(logoMatch){

logo = logoMatch[1];

}

channels.push({
name,
url,
logo
});

}

}

renderChannels();

if(channels.length > 0){

playChannel(0);

}

});

/* Render Channels */

function renderChannels(){

const container =
document.getElementById('channels');

container.innerHTML = '';

channels.forEach((ch,index)=>{

const div =
document.createElement('div');

div.className = 'channel';

div.innerHTML = `

<img src="${ch.logo}">
<div>${ch.name}</div>

`;

div.onclick = ()=> playChannel(index);

container.appendChild(div);

});

}

/* Play Channel */

function playChannel(index){

currentIndex = index;

const channel = channels[index];

const video =
document.getElementById('video');

if(Hls.isSupported()){

const hls = new Hls();

hls.loadSource(channel.url);

hls.attachMedia(video);

}

else{

video.src = channel.url;

}

document.querySelectorAll('.channel')
.forEach(el=> el.classList.remove('active'));

document.querySelectorAll('.channel')[index]
.classList.add('active');

}

/* Next Channel */

function nextChannel(){

currentIndex++;

if(currentIndex >= channels.length){

currentIndex = 0;

}

playChannel(currentIndex);

}

/* Previous Channel */

function prevChannel(){

currentIndex--;

if(currentIndex < 0){

currentIndex = channels.length -1;

}

playChannel(currentIndex);

}

/* Play Pause */

function togglePlay(){

const video =
document.getElementById('video');

if(video.paused){

video.play();

}

else{

video.pause();

}

}

/* Volume */

function changeVolume(value){

document.getElementById('video')
.volume = value;

}

/* Fullscreen */

function toggleFullscreen(){

const video =
document.getElementById('video');

if(document.fullscreenElement){

document.exitFullscreen();

}

else{

video.requestFullscreen();

}

}

/* Search */

function searchChannel(){

const input =
document.getElementById('search')
.value.toLowerCase();

const channelDivs =
document.querySelectorAll('.channel');

channels.forEach((ch,index)=>{

if(ch.name.toLowerCase()
.includes(input)){

channelDivs[index]
.style.display = 'flex';

}

else{

channelDivs[index]
.style.display = 'none';

}

});

}

/* Auto Hide Visitor Popup */

setTimeout(()=>{

document.getElementById('visitorToast')
.style.display='none';

},5000);

</script>

</body>
</html>
