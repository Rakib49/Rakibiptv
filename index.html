<style>

/* HEADER */

.header{

background:#000;

padding:14px;

text-align:center;

border-top:3px solid red;
border-bottom:3px solid red;

position:sticky;
top:0;
z-index:99999;

}

/* ANIMATED TITLE */

.header h1{

font-size:42px;
font-weight:bold;

background:linear-gradient(
90deg,
#ff0000,
#ff00ff,
#00ffff,
#00ff00,
#ffff00,
#ff0000
);

background-size:400%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:glow 5s linear infinite;

text-shadow:
0 0 10px rgba(255,0,0,.8),
0 0 20px rgba(255,0,0,.6),
0 0 35px rgba(255,0,0,.4);

}

/* COLOR ANIMATION */

@keyframes glow{

0%{
background-position:0%;
}

100%{
background-position:400%;
}

}

/* PLAYER */

.player-box{

position:sticky;
top:78px;

z-index:999;

background:#000;

padding-bottom:8px;

}

video{

width:100%;
height:260px;

background:#000;

object-fit:contain;

}

/* PC + TV */

@media(min-width:1000px){

video{
height:82vh;
}

}

/* CONTROLS */

.custom-controls{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

display:flex;
gap:18px;

z-index:9999;

transition:.4s;

}

.control-btn{

width:62px;
height:62px;

border:none;
border-radius:50%;

background:rgba(255,0,0,.92);

color:white;

font-size:24px;
font-weight:bold;

display:flex;
justify-content:center;
align-items:center;

box-shadow:
0 0 15px rgba(255,0,0,.8);

}

/* CHANNEL GRID */

.channel-grid{

display:grid;
grid-template-columns:repeat(3,1fr);

gap:14px;

padding:14px;

}

/* CHANNEL */

.channel{

background:white;

border-radius:22px;

padding:10px;

height:105px;

display:flex;
justify-content:center;
align-items:center;

border:3px solid #00d9ff;

box-shadow:
0 0 12px rgba(0,217,255,.8);

transition:.3s;

cursor:pointer;

}

.channel img{

width:100%;
height:100%;

object-fit:contain;

}

/* ACTIVE */

.active{

border:3px solid #00ff66 !important;

box-shadow:
0 0 15px #00ff66,
0 0 30px rgba(0,255,102,.8) !important;

}

/* LIVE */

.live-counter{

position:fixed;

left:15px;
bottom:20px;

background:rgba(0,0,0,.82);

padding:12px 18px;

border-radius:18px;

font-size:16px;
font-weight:bold;

z-index:99999;

backdrop-filter:blur(10px);

}

/* CONTACT */

.contact{

text-align:center;

padding:20px;

font-size:20px;
font-weight:bold;

}

.social{

display:flex;
justify-content:center;
gap:20px;

padding-bottom:25px;

}

.social a{

width:58px;
height:58px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:28px;

color:white;
text-decoration:none;

}

.telegram{
background:#229ED9;
}

.facebook{
background:#1877F2;
}

</style>

<script>

/* CHANNEL CLICK */

function playChannel(index){

currentIndex=index;

const video =
document.getElementById('video');

const channel =
channels[index];

video.muted=false;
video.volume=1;

if(Hls.isSupported()){

const hls =
new Hls();

hls.loadSource(channel.url);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

video.play();

});

}

else{

video.src=channel.url;

video.play();

}

/* ACTIVE */

document.querySelectorAll('.channel')
.forEach(el=>{

el.classList.remove('active');

});

document.querySelectorAll('.channel')[index]
.classList.add('active');

/* ONLY CHANNEL LIST SCROLL */

document.querySelectorAll('.channel')[index]
.scrollIntoView({

behavior:'smooth',
block:'center'

});

}

/* CONTROL AUTO HIDE */

const controls =
document.querySelector('.custom-controls');

function showControls(){

controls.style.opacity='1';

clearTimeout(window.controlTimer);

window.controlTimer =
setTimeout(()=>{

controls.style.opacity='0';

},5000);

}

document.querySelector('.player-box')
.addEventListener('click',showControls);

showControls();

</script>
