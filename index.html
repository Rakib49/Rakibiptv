<!DOCTYPE html>
<html>
<head>

<title>Rakib IPTV</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#070b1a;
font-family:Arial;
color:white;
}

header{
background:linear-gradient(90deg,#ff1493,#ff69b4);
padding:16px;
text-align:center;
font-size:30px;
font-weight:bold;
color:white;
box-shadow:0 0 15px #ff1493;
}

.player-container{
position:relative;
background:black;
}

video{
width:100%;
height:230px;
background:black;
}

.controls{
position:absolute;
bottom:10px;
width:100%;
display:flex;
justify-content:center;
align-items:center;
gap:25px;
}

.control-btn{

width:60px;
height:60px;
border-radius:50%;
border:none;
font-size:28px;
background:#ff1493;
color:white;
box-shadow:0 0 10px #ff1493;
}

.search-box{
padding:12px;
background:#111827;
}

.search-box input{

width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
background:#1e293b;
color:white;
outline:none;
}

#channels{
padding:10px;
}

.channel{

display:flex;
align-items:center;
gap:15px;
background:#111827;
padding:14px;
margin-top:10px;
border-radius:14px;
cursor:pointer;
transition:.3s;
font-size:20px;
font-weight:bold;
}

.channel:hover{
background:#ff149320;
transform:scale(1.02);
}

.channel img{

width:55px;
height:55px;
border-radius:12px;
object-fit:cover;
}

.active{
border:2px solid #ff1493;
}

</style>
</head>

<body>

<header>
🌸 Rakib IPTV 🌸
</header>

<div class="player-container">

<video id="video" controls autoplay></video>

<div class="controls">

<button class="control-btn"
onclick="prevChannel()">⏮</button>

<button class="control-btn"
onclick="togglePlay()">⏯</button>

<button class="control-btn"
onclick="nextChannel()">⏭</button>

</div>

</div>

<div class="search-box">

<input type="text"
id="search"
placeholder="Search channel..."
onkeyup="searchChannel()">

</div>

<div id="channels"></div>

<script>

const playlist =
'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';

let channels = [];
let currentIndex = 0;

fetch(playlist)

.then(response => response.text())

.then(data => {

const lines = data.split('\n');

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith('#EXTINF')){

const info = lines[i];

const url = lines[i+1];

const name = info.split(',')[1];

let logo = '';

const logoMatch =
info.match(/tvg-logo="(.*?)"/);

if(logoMatch){

logo = logoMatch[1];

}

channels.push({
name,
url,
logo
});

}

}

renderChannels();

if(channels.length > 0){

playChannel(0);

}

});

function renderChannels(){

const container =
document.getElementById('channels');

container.innerHTML = '';

channels.forEach((ch,index)=>{

const div =
document.createElement('div');

div.className = 'channel';

div.innerHTML = `

<img src="${ch.logo}">
<div>${ch.name}</div>

`;

div.onclick = ()=> playChannel(index);

container.appendChild(div);

});

}

function playChannel(index){

currentIndex = index;

const channel = channels[index];

const video =
document.getElementById('video');

if(Hls.isSupported()){

const hls = new Hls();

hls.loadSource(channel.url);

hls.attachMedia(video);

}

else{

video.src = channel.url;

}

document.querySelectorAll('.channel')
.forEach(el=> el.classList.remove('active'));

document.querySelectorAll('.channel')[index]
.classList.add('active');

}

function nextChannel(){

currentIndex++;

if(currentIndex >= channels.length){

currentIndex = 0;

}

playChannel(currentIndex);

}

function prevChannel(){

currentIndex--;

if(currentIndex < 0){

currentIndex = channels.length -1;

}

playChannel(currentIndex);

}

function togglePlay(){

const video =
document.getElementById('video');

if(video.paused){

video.play();

}

else{

video.pause();

}

}

function searchChannel(){

const input =
document.getElementById('search')
.value.toLowerCase();

const channelDivs =
document.querySelectorAll('.channel');

channels.forEach((ch,index)=>{

if(ch.name.toLowerCase()
.includes(input)){

channelDivs[index]
.style.display = 'flex';

}

else{

channelDivs[index]
.style.display = 'none';

}

});

}

</script>

</body>
</html>
