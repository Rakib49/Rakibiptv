<!DOCTYPE html>
<html>
<head>
<title>Rakib IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#0f172a;
font-family:Arial;
color:white;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

video{
width:100%;
background:black;
}

#channels{
padding:10px;
}

.channel{
background:#1e293b;
padding:12px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
}

.channel img{
width:40px;
height:40px;
border-radius:8px;
object-fit:cover;
}

.channel:hover{
background:#334155;
}

</style>
</head>

<body>

<header>
Rakib IPTV
</header>

<video id="video" controls autoplay></video>

<div id="channels"></div>

<script>

const playlist =
'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';

fetch(playlist)
.then(response => response.text())
.then(data => {

const lines = data.split('\n');

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith('#EXTINF')){

const info = lines[i];

const url = lines[i+1];

const name = info.split(',')[1];

let logo = '';

const logoMatch =
info.match(/tvg-logo="(.*?)"/);

if(logoMatch){

logo = logoMatch[1];

}

const div =
document.createElement('div');

div.className = 'channel';

div.innerHTML = `
<img src="${logo}">
<div>${name}</div>
`;

div.onclick = () => playVideo(url);

document.getElementById('channels')
.appendChild(div);

}

}

});

function playVideo(url){

const video =
document.getElementById('video');

if(Hls.isSupported()){

const hls = new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}

else{

video.src = url;

}

}

</script>

</body>
</html>
